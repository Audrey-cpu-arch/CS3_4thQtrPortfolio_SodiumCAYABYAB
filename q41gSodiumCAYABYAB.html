<!DOCTYPE html>
<html>
  <body>
    <h1> Add a Movie</h1>
    <p>Title:</p>
    <input id = "movie title" type = text> </input>

    <p>Year:</p>
    <input id = "year" type = text> </input>

    <p>Title:</p>
    <input id = "genre" type = text> </input>
    
    <script>
      const movie_information = {};
      movie_information.title = document.GetElementById("movie title");
      movie_information.year = document.GetElementById("year");
      movie_information.genre = document.GetElementById("genre");

      localStorage.setItem("info", JSON.stringify("movie_information"));
    </script>
  </body>
</html>
