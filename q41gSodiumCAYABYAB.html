
<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="q41gSodiumCAYABYAB.css">
</head>


  
  <body>

    
    <h1> Add a Movie</h1>


    <div id = "movie-title">
    <p>Title:</p>
    <input id = "movie title" type = "text"> 
</div>

<div id = "movie-year">
    <p>Year:</p>
    <input id = "year" type = "number"> 
</div>

    <div id = "genre-label"> 
    <p>Genre:</p>
      <select id = "genre" required>
            <option value = "action"> action </option>
            <option value = "adventure"> adventure </option>
            <option value = "comedy"> comedy </option>
            <option value = "drama"> drama </option>
            <option value = "fantasy"> fantasy </option>
            <option value = "horror"> horror </option>
            <option value = "mystery" > mystery </option>
            <option value = "romance"> romance </option>
            <option value = "thriller"> thrillder </option>
            <option value = "science fiction"> science fiction </option>
            <option value = "western"> western </option>
            <option value = "sports"> sports </option>
            <option value = "musical"> musical </option>
            <option value = "other"> Other genre that isn't mentioned in the list </option>
        </select>
    </div>

<div id = "rating-label">
<p> Rating:</p>

<div class="ratings">
<input type = "radio" id = "rating1" value = "1" name = "rating"> 
</div>

<label for = "rating1"> <img src = "/assets/star.png" width ="20" height = "20"></label>

<div class="ratings">
<input type = "radio" id = "rating2" value = "2" name = "rating">
</div>
<label for = "rating2"> <img src = "/assets/star.png" width ="20" height = "20"> </label>

<div class="ratings">
<input type = "radio" id = "rating3" value = "3" name = "rating">
</div>
<label for = "rating3"> <img src = "/assets/star.png" width ="20" height = "20"> </label>

<div class="ratings">
<input type = "radio" id = "rating4" value = "4" name = "rating">
</div>
<label for = "rating4"> <img src = "/assets/star.png" width ="20" height = "20"> </label>

<div class="ratings">
<input type = "radio" id = "rating5" value = "5" name = "rating">
</div>
<label for = "rating5"> <img src = "/assets/star.png" width ="20" height = "20"> </label>

</div>


 <button onclick="addMovie()" class = "button" >Add Movie</button>

 <div id = "movie-list">
    <h2> Movie List</h2>
  </div>
     <p id = "movie" ></p>

 
    
    <script>
      function addMovie (){
const movie_information = {};
      movie_information.title = document.getElementById("movie title").value;
      movie_information.year = document.getElementById("year").value;
      movie_information.genre = document.getElementById("genre").value;
      movie_information.rating = document.querySelector('input[name="rating"]:checked').value;
localStorage.setItem("info", JSON.stringify(movie_information));
document.getElementById("movie").innerHTML += "<br>" +movie_information.title + " "+ "("  + movie_information.year + ")" + " " + movie_information.genre +  " " + ",Rating:" + movie_information.rating + "<br>";
        
      };
    
    </script>
  </body>
</html>
