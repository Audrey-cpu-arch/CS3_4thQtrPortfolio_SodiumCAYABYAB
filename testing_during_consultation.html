    <script>


function getAverage(){
        let values = document.querySelector('input[name="rating"]:checked').value;
        let values_and_length = JSON.parse(localStorage.getItem("arrei")) || [];

  if( values == "⭐"){
          values = 1;
        }
        else if (values == "⭐⭐"){
          values = 2;
        }
        else if (values == "⭐⭐⭐"){
          values = 3;
        }
        else if (values == "⭐⭐⭐⭐"){
          values = 4;
        }
        else if (values == "⭐⭐⭐⭐⭐"){
          values = 5;
        }
        

        
values_and_length.push(values);
let length_of_array = values_and_length.length;
         let starting_point = 0;
        for ( let i = 0; i <length_of_array;i++){
          starting_point += values_and_length[i];
        }

        
        let averaged = starting_point/length_of_array;
       localStorage.setItem("arrei", JSON.stringify(values_and_length));
       localStorage.setItem("average", JSON.stringify(averaged));
      }



      


      function addMovie (){
        getAverage();
const movie_information = {};
      movie_information.title = document.getElementById("movie title").value;
      movie_information.year = document.getElementById("year").value;
      movie_information.genre = document.getElementById("genre").value;
      movie_information.rating = document.querySelector('input[name="rating"]:checked').value;

      let  information = JSON.parse(localStorage.getItem("info")) || [];
      information.push(movie_information);
      localStorage.setItem("info", JSON.stringify(information)); 

     let index_of_movie_to_be_deleted = information.indexOf(movie_information);
     
const output_movie_on_page = document.createElement("p");
output_movie_on_page.innerHTML = "<br>" +movie_information.title + " "+ "("  + movie_information.year + ")" + " " + "-" + " " +movie_information.genre +  ",Rating:" + movie_information.rating + " " + " " + "<button id='deleteMovie' onclick = 'deleteMovie(" + index_of_movie_to_be_deleted + ", "+output_movie_on_page+")'> Delete </button>" +  "<br>";
document.getElementById("movie").appendChild(output_movie_on_page);
        
 };
       

        
//use onload to get from localstorage




function staytheSame(){
 
  let ouput = JSON.parse(localStorage.getItem("info"));
  for (let i = 0; i < ouput.length; i++){
    document.getElementById("movie").innerHTML += "<br>" +ouput[i].title + " "+ "("  + ouput[i].year + ")" + " " + "-" + " " +ouput[i].genre +  ",Rating:" + ouput[i].rating + " " + " " + "<button id='deleteMovie' onclick = 'deleteMovie()'> Delete </button>" +  "<br>";
  }
}
    
    
                    function deleteMovie(deleted,cleared_from_list){
  if (confirm("Are you sure you want to delete this movie?") === true) {  
  let to_be_deleted = JSON.parse(localStorage.getItem("info"));
  // I have to make a process that gets the movie and values of the movie you are deleting
  // Find the index of the movie
  // Create a new version of the array without the deleted movie (splice)
  // Save the new version into local storage as the new value of the key "info"
  
  let must_delete = to_be_deleted.indexOf(deleted,0);
  to_be_deleted.splice(must_delete,1);
localStorage.setItem("info", JSON.stringify(to_be_deleted));
document.getElementById("movie").removeChild(cleared_from_list);
    
      //press delete it will find the name of the one to be deleted then match
      // good idea is to make sperate li parts
      
}};



    </script>
